# GraalVM Native Image Configuration
# https://www.graalvm.org/latest/reference-manual/native-image/

# JVM initialization options
Args = --initialize-at-run-time=com.baomidou.mybatisplus,org.mybatis,org.apache.ibatis,com.alibaba.druid,org.apache.http.impl.client,org.apache.http.impl.execchain,org.camunda.bpm.engine,org.springframework.data.redis,org.redisson.client,io.netty,org.apache.http.client,io.jsonwebtoken,org.springframework.security.oauth2.server.resource.authentication

# Enable verbose output for debugging (optional)
# Args = --verbose

# Native Image build settings
# ImageName = jia-api-native

# Additional configuration for native image
# Enable class reflection for dynamic features
# -H:+AllowFoldableRedefineTypes
